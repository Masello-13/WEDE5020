    <style>
      :root {
        --bg: #ffffff;
        --text: #222222;
        --primary: #0066ff;
        --accent: #00d4ff;
        --green: #00c853;
        --border: #e0e0e0;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
        line-height: 1.6;
        color: var(--text);
      }

      nav {
        position: sticky;
        top: 0;
        z-index: 1000;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 18px 40px;
        background: rgba(255, 255, 255, 0.97);
        border-bottom: 1px solid #e0e0e0;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      }

      .Logo {
        font-size: 29px;
        font-weight: 800;
        text-decoration: none;
        color: #111;
        letter-spacing: -1.2px;
      }

      .Nav-bar {
        display: flex;
        gap: 32px;
        font-size: 17px;
        font-weight: 500;
      }

      .Nav-bar a {
        text-decoration: none;
        color: var(--text);
        transition: all 0.3s ease;
      }

      .Nav-bar a:hover {
        color: var(--primary);
        transform: translateY(-2px);
      }

      .contact-section {
        padding: 100px 20px 120px;
        text-align: center;
      }

      h2 {
        font-size: 42px;
        margin-bottom: 12px;
        color: #111;
        font-weight: 700;
        letter-spacing: -1.5px;
      }

      .subtitle {
        font-size: 1.25rem;
        color: whitesmoke;
        max-width: 600px;
        margin: 0 auto 50px;
      }

      .contact-card {
        max-width: 520px;
        margin: 0 auto;
        background: white;
        padding: 50px 40px;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
        border: 1px solid #e0e8ff;
      }

      .form-group {
        margin-bottom: 24px;
        text-align: left;
      }

      .form-group label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        color: #444;
        margin-bottom: 8px;
      }

      .form-group input,
      .form-group textarea {
        width: 100%;
        padding: 14px 16px;
        font-size: 16px;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        outline: none;
        transition: all 0.3s ease;
        font-family: inherit;
      }

      .form-group input:focus,
      .form-group textarea:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(0, 102, 255, 0.1);
      }

      .form-group textarea {
        min-height: 140px;
        resize: vertical;
      }

      .submit-btn {
        width: 100%;
        padding: 16px;
        background: var(--primary);
        color: white;
        font-size: 17px;
        font-weight: 600;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 10px;
      }

      .submit-btn:hover {
        background: #0055dd;
        transform: translateY(-2px);
      }

      footer {
        text-align: center;
        padding: 50px 24px;
        background: #111;
        color: #aaa;
        font-size: 14.5px;
      }

      footer strong {
        color: white;
      }
    </style>
  </head>
