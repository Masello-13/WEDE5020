<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tech_Path ZA | Contact Us</title>

    <style>
      .contact-container {
    max-width: 1200px;
    margin: auto;
    display: flex;
    gap: 40px;
    align-items: flex-start;
    justify-content: center;
    flex-wrap: wrap;
}

.contact-card,
.map-card {
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 35px rgba(0,0,0,0.08);
    border: 1px solid #e0e8ff;
    flex: 1;
    min-width: 350px;
}

.contact-card h3,
.map-card h3 {
    margin-bottom: 20px;
    color: #0066ff;
}

.map-card iframe {
    border-radius: 12px;
}

@media screen and (max-width:768px){

    nav{
        flex-direction:column;
        gap:15px;
    }

    .Nav-bar{
        flex-direction:column;
        text-align:center;
    }

    .contact-container{
        flex-direction:column;
    }

    .contact-card,
    .map-card{
        width:100%;
    }

    h2{
        font-size:32px;
    }

}
   </style> 
        
    
  </head>
  <body
    background="person-working-html-computer-1-1024x768.jpg"
    style="background-repeat: no-repeat; background-size: cover"
  >
    <nav>
      <a class="Logo" href="Index.html">Tech_Path ZA</a>
      <div class="Nav-bar">
        <a href="Index.html">Home</a>
        <a href="roadmap.html">Roadmap</a>
        <a href="about.html">About</a>
        <a href="#">Contact us</a>
      </div>
    </nav>

    <section class="contact-section">
      <h2>Contact us</h2>
      <p class="subtitle">
        Have questions about tech careers in South Africa? <br />
        We'd love to hear from you!
      </p>

      <div class="contact-card">
        <div class="form-group">
          <label for="name">Your full name</label>
          <input id="name" type="text" placeholder="e.g. Masello Phetoe" />
        </div>

        <div class="form-group">
          <label for="email">Email address</label>
          <input id="email" type="email" placeholder="you@example.com" />
        </div>

        <div class="form-group">
          <label for="message">Your message</label>
          <textarea id="message" placeholder="Ask us anything..."></textarea>
        </div>

        <button class="submit-btn">Send Message</button>
      </div>
    </section>

    <footer>
      <strong>TechPath ZA</strong> &nbsp;·&nbsp; Realistic tech career guidance
      for South Africa &nbsp;·&nbsp; © 2026
    </footer>
  </body>
</html>
<script src="scripts.js"></script>
